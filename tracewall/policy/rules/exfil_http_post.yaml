rule: block_http_post_after_secret_read
surface: capability_abuse
on: pre_tool_call
match:
  tool: http_post
  context:
    call_tree_contains_any:
      - read_secret
      - read_credentials
      - get_secret
      - read_env
      - load_key
verdict: BLOCK
reason: "http_post after secret-read in call tree"
severity: 0.9
