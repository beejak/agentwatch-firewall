rule: block_destructive_filesystem_ops
surface: capability_abuse
on: pre_tool_call
match:
  tool: bash
  any:
    - arg.command: { regex: "\\brm\\s+-rf\\b" }
    - arg.command: { regex: "\\bshred\\b" }
    - arg.command: { regex: "\\btruncate\\b.*--size\\s+0" }
    - arg.command: { regex: "(?i)\\b(curl|wget)\\b[^\\n]{0,120}\\|\\s*(ba)?sh\\b" }
    - arg.command: { regex: "(?i)\\|\\s*(ba)?sh\\s*$" }
verdict: BLOCK
reason: "destructive or remote-exec shell operation blocked"
severity: 0.95
