rule: block_send_message_after_secret_read
surface: capability_abuse
on: pre_tool_call
match:
  tool: send_message
  context:
    call_tree_contains_any:
      - read_secret
      - read_credentials
      - get_secret
      - read_env
      - load_key
verdict: BLOCK
reason: "send_message after secret-read in call tree"
severity: 0.9
