services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --appendonly yes
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24
    ports: ["8123:8123", "9000:9000"]
    volumes: [ch_data:/var/lib/clickhouse]
    environment:
      CLICKHOUSE_DB: watchtower
      CLICKHOUSE_USER: wt
      CLICKHOUSE_PASSWORD: wt
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: pgvector/pgvector:pg16
    ports: ["5433:5432"]
    volumes: [pg_data:/var/lib/postgresql/data]
    environment:
      POSTGRES_DB: watchtower
      POSTGRES_USER: wt
      POSTGRES_PASSWORD: wt
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wt -d watchtower"]
      interval: 5s
      timeout: 3s
      retries: 10

  neo4j:
    image: neo4j:5
    ports: ["7474:7474", "7687:7687"]
    volumes: [neo4j_data:/data]
    environment:
      NEO4J_AUTH: neo4j/watchtower
      NEO4J_PLUGINS: '["apoc"]'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10

  langfuse:
    image: langfuse/langfuse:latest
    ports: ["3010:3000"]
    environment:
      DATABASE_URL: postgresql://wt:wt@postgres:5432/langfuse
      NEXTAUTH_SECRET: watchtower-poc-secret-32chars-long
      SALT: watchtower-salt-16chars
      NEXTAUTH_URL: http://localhost:3010
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/public/health"]
      interval: 10s
      timeout: 5s
      retries: 15

volumes:
  redis_data:
  ch_data:
  pg_data:
  neo4j_data:
