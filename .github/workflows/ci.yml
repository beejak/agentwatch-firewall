name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.10
        ports:
          - 8123:8123
          - 9000:9000
        env:
          CLICKHOUSE_DB: watchtower
          CLICKHOUSE_USER: wt
          CLICKHOUSE_PASSWORD: wt
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
        options: >-
          --health-cmd "wget -qO- http://localhost:8123/ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (pulls watchtower from pinned tag)
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[dev]"

      - name: Wait for ClickHouse
        run: |
          for i in {1..30}; do
            if wget -qO- http://localhost:8123/ping; then break; fi
            sleep 2
          done

      - name: Run tests (deterministic semantic backend)
        env:
          WT_SEMANTIC_LLM: "0"
        run: .venv/bin/python -m pytest tests/ -q --asyncio-mode=auto -o addopts=""
