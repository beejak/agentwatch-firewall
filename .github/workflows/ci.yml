name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests (pure, infra-free, deterministic semantic backend)
        run: pytest -q

      - name: Eval harness smoke (deterministic held-out)
        run: python -m tracewall.eval.harness --split test

      - name: MCP profile brink (success + expected limits)
        run: python -m tracewall.eval.mcp_brink
