rule: block_destructive_filesystem_ops
surface: capability_abuse
on: pre_tool_call
match:
  tool: bash
  any:
    - arg.command: { regex: "\\brm\\s+-rf\\b" }
    - arg.command: { regex: "\\bshred\\b" }
    - arg.command: { regex: "\\btruncate\\b.*--size\\s+0" }
verdict: BLOCK
reason: "destructive filesystem operation blocked"
severity: 0.95
